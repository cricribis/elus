<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#0f1923; color:#e8edf2; height:100vh; overflow:hidden; }

  /* ─── HEADER ─── */
  #header {
    position:absolute; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(135deg,#1a2a3a 0%,#0d1f2d 100%);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:0 20px; height:56px;
    box-shadow:0 2px 20px rgba(0,0,0,0.4);
  }
  #header h1 { font-size:17px; font-weight:600; letter-spacing:.3px; color:#fff; }
  #header h1 span { color:#4a9eff; }
  #header-stats { display:flex; gap:16px; }
  .stat-badge {
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    border-radius:20px; padding:4px 12px; font-size:12px; color:#a0b4c8;
  }
  .stat-badge strong { color:#fff; font-weight:600; }

  /* ─── MAP ─── */
  #map { position:absolute; top:56px; left:0; right:0; bottom:0; }

  /* ─── SEARCH BAR ─── */
  #search-box {
    position:absolute; top:70px; left:50%; transform:translateX(-50%);
    z-index:900; width:340px;
  }
  #search-input {
    width:100%; padding:10px 16px 10px 40px;
    background:rgba(15,25,35,0.92); border:1px solid rgba(255,255,255,0.15);
    border-radius:24px; color:#fff; font-size:14px; font-family:'Inter',sans-serif;
    backdrop-filter:blur(12px); outline:none;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
    transition:border-color .2s;
  }
  #search-input:focus { border-color:#4a9eff; }
  #search-input::placeholder { color:#5a7a9a; }
  .search-icon {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:#5a7a9a; font-size:15px; pointer-events:none;
  }
  #search-results {
    background:rgba(15,25,35,0.96); border:1px solid rgba(255,255,255,0.12);
    border-radius:12px; margin-top:6px; overflow:hidden;
    box-shadow:0 8px 32px rgba(0,0,0,0.5); backdrop-filter:blur(12px);
    display:none;
  }
  .search-item {
    padding:10px 16px; cursor:pointer; font-size:13px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    transition:background .15s;
  }
  .search-item:last-child { border-bottom:none; }
  .search-item:hover { background:rgba(74,158,255,0.15); }
  .search-item strong { color:#4a9eff; }
  .search-item small { color:#708090; }

  /* ─── LEGEND ─── */
  #legend {
    position:absolute; bottom:24px; left:16px; z-index:900;
    background:rgba(15,25,35,0.92); border:1px solid rgba(255,255,255,0.1);
    border-radius:12px; padding:14px 16px;
    backdrop-filter:blur(12px); box-shadow:0 4px 20px rgba(0,0,0,0.4);
    min-width:210px;
  }
  #legend h4 { font-size:11px; font-weight:600; color:#7a9ab5; text-transform:uppercase;
    letter-spacing:.8px; margin-bottom:10px; }
  .legend-item { display:flex; align-items:center; gap:9px; margin-bottom:7px; font-size:12.5px; color:#c8d8e8; }
  .legend-dot {
    width:11px; height:11px; border-radius:50%; flex-shrink:0;
    box-shadow:0 0 6px rgba(255,255,255,0.25);
  }
  .legend-item:last-child { margin-bottom:0; }

  /* ─── PANEL ─── */
  #panel {
    position:absolute; top:56px; right:0; bottom:0;
    width:380px; z-index:800;
    background:rgba(13,22,31,0.97); border-left:1px solid rgba(255,255,255,0.08);
    display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
    backdrop-filter:blur(16px);
  }
  #panel.open { transform:translateX(0); }

  #panel-header {
    padding:20px 20px 0;
    border-bottom:1px solid rgba(255,255,255,0.08);
    flex-shrink:0;
  }
  #panel-close {
    position:absolute; top:68px; right:388px;
    width:32px; height:32px; border-radius:50%;
    background:rgba(13,22,31,0.9); border:1px solid rgba(255,255,255,0.15);
    color:#fff; cursor:pointer; display:none; align-items:center; justify-content:center;
    font-size:18px; z-index:810; transition:background .2s;
  }
  #panel-close:hover { background:rgba(74,158,255,0.2); }
  #panel.open ~ #panel-close { display:flex; }

  #commune-name {
    font-size:20px; font-weight:700; color:#fff; margin-bottom:4px;
  }
  #commune-code { font-size:12px; color:#5a7a9a; margin-bottom:14px; }

  #panel-tabs {
    display:flex; gap:4px; padding-bottom:0;
    overflow-x:auto; scrollbar-width:none;
  }
  #panel-tabs::-webkit-scrollbar { display:none; }
  .tab-btn {
    padding:8px 14px; border-radius:8px 8px 0 0; border:none;
    background:transparent; color:#5a7a9a; font-size:12.5px; font-weight:500;
    cursor:pointer; white-space:nowrap; transition:all .15s;
    border-bottom:2px solid transparent;
    font-family:'Inter',sans-serif;
  }
  .tab-btn.active { color:#fff; border-bottom-color:#4a9eff; background:rgba(74,158,255,0.1); }
  .tab-btn:hover:not(.active) { color:#c0d0e0; background:rgba(255,255,255,0.05); }
  .tab-count {
    display:inline-block; background:rgba(255,255,255,0.1);
    border-radius:10px; padding:1px 6px; font-size:10px; margin-left:4px;
  }

  #panel-body { flex:1; overflow-y:auto; padding:16px 20px; scrollbar-width:thin; scrollbar-color:#2a3a4a transparent; }
  #panel-body::-webkit-scrollbar { width:4px; }
  #panel-body::-webkit-scrollbar-thumb { background:#2a3a4a; border-radius:2px; }

  .elu-card {
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
    border-radius:10px; padding:12px 14px; margin-bottom:8px;
    transition:background .15s;
  }
  .elu-card:hover { background:rgba(255,255,255,0.07); }
  .elu-card .elu-name { font-size:13.5px; font-weight:500; color:#e0eaf5; }
  .elu-card .elu-fn {
    font-size:11.5px; color:#6a8a9a; margin-top:3px;
    font-style:italic;
  }
  .elu-card .elu-extra { font-size:11px; color:#4a6a7a; margin-top:2px; }

  .elu-mayor {
    background:linear-gradient(135deg,rgba(74,158,255,0.15),rgba(74,158,255,0.05));
    border-color:rgba(74,158,255,0.3);
  }
  .elu-mayor .elu-name { color:#7ab8ff; font-weight:600; }

  .section-title {
    font-size:11px; font-weight:600; color:#4a6a8a; text-transform:uppercase;
    letter-spacing:.7px; margin:14px 0 8px;
  }

  .empty-state { text-align:center; color:#3a5a7a; padding:40px 20px; font-size:13px; }

  /* ─── DEPT PANEL ─── */
  #dept-btn {
    position:absolute; bottom:24px; right:16px; z-index:900;
    background:rgba(15,25,35,0.92); border:1px solid rgba(255,255,255,0.15);
    border-radius:12px; padding:10px 16px; cursor:pointer; color:#c8d8e8;
    font-size:13px; font-weight:500; font-family:'Inter',sans-serif;
    backdrop-filter:blur(12px); transition:all .2s;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
    display:flex; align-items:center; gap:8px;
  }
  #dept-btn:hover { background:rgba(74,158,255,0.2); border-color:#4a9eff; color:#fff; }

  /* ─── LOADING ─── */
  #loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:2000; text-align:center; color:#c8d8e8;
  }
  .spinner {
    width:40px; height:40px; border:3px solid rgba(74,158,255,0.2);
    border-top-color:#4a9eff; border-radius:50%;
    animation:spin 0.8s linear infinite; margin:0 auto 12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading-text { font-size:13px; color:#5a7a9a; }
  #loading-sub { font-size:11px; color:#3a5a7a; margin-top:6px; }

  /* Leaflet overrides */
  .leaflet-popup-content-wrapper {
    background:rgba(13,22,31,0.95); color:#c8d8e8; border:1px solid rgba(255,255,255,0.12);
    border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background:rgba(13,22,31,0.95); }
  .leaflet-popup-content { margin:10px 14px; font-size:13px; font-family:'Inter',sans-serif; }
  .leaflet-popup-content strong { color:#4a9eff; display:block; margin-bottom:2px; }
  .leaflet-popup-content em { color:#7a9ab5; font-style:normal; font-size:11px; }
  .leaflet-control-zoom { border:1px solid rgba(255,255,255,0.1) !important; }
  .leaflet-control-zoom a {
    background:rgba(15,25,35,0.9) !important; color:#c8d8e8 !important;
    border-color:rgba(255,255,255,0.1) !important;
  }
  .leaflet-control-zoom a:hover { background:rgba(74,158,255,0.2) !important; }
</style>

// ─── COLOR MAP ───
const COLORS = {
  maire:   '#4a9eff',
  cm:      '#4a9eff',
  epci:    '#f97316',
  dep:     '#a0522d',
  reg:     '#eab308',

// ─── LEAFLET INIT ───

function makeIcon(color, size=10) {
  return L.divIcon({
    className:'',
    html:`<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      background:${color};border:2px solid rgba(255,255,255,0.7);
      box-shadow:0 0 8px ${color}88;
      cursor:pointer;
    "></div>`,
    iconSize:[size,size],
    iconAnchor:[size/2,size/2]
  });
}

// ─── GEOCODE 511 COMMUNES via api.gouv.fr ───
async function geocodeCommunes() {
  const loading = document.getElementById('loading');
  const loadingText = document.getElementById('loading-text');
  const loadingSub = document.getElementById('loading-sub');

  const communes = ELUS.communes;
  const codes = communes.map(c => c.code);
  
  loadingText.textContent = 'Géolocalisation des communes…';
  loadingSub.textContent = `Appel à l\'API officielle française`;

  try {
    // Batch fetch from api.gouv.fr - get all dept 67 communes
    const url = 'https://geo.api.gouv.fr/communes?codeDepartement=67&fields=code,nom,centre&format=json&geometry=centre';
    const resp = await fetch(url);
    const geoData = await resp.json();
    
    const geoLookup = {};
    for (const g of geoData) {
      if (g.centre && g.centre.coordinates) {
        geoLookup[g.code] = { lat: g.centre.coordinates[1], lng: g.centre.coordinates[0] };
      }
    }

    loadingSub.textContent = `${geoData.length} communes géolocalisées`;

    let placed = 0;
    for (const commune of communes) {
      const geo = geoLookup[commune.code];
      if (!geo) continue;
      
      commune.lat = geo.lat;
      commune.lng = geo.lng;

      const hasEpci = commune.conseillers_epci && commune.conseillers_epci.length > 0;
      const color = hasEpci ? COLORS.epci : COLORS.maire;
      const size = commune.nom === 'Strasbourg' ? 16 : 10;

      const marker = L.marker([geo.lat, geo.lng], { icon: makeIcon(color, size) });
      
      marker.bindPopup(`
        <strong>${commune.nom}</strong>
        <em>Maire : ${commune.maire}</em>
      `);
      
      marker.on('click', () => openCommune(commune));
      marker.addTo(markers);
      communeIndex[commune.code] = { ...commune, marker };
      placed++;
    }

    loadingText.textContent = `${placed} communes chargées ✓`;
    setTimeout(() => { loading.style.display='none'; }, 600);

    // Stats
    const totalElus = communes.reduce((a,c) => a + 1 + c.conseillers_mun.length + c.conseillers_epci.length, 0)
      + ELUS.conseillers_dep.length + ELUS.senateurs.length + ELUS.deputes.length
      + ELUS.conseillers_reg.length;
    document.getElementById('stat-communes').textContent = placed;
    document.getElementById('stat-elus').textContent = totalElus.toLocaleString('fr');

  } catch(err) {
    loadingText.textContent = '⚠ Erreur de chargement';
    loadingSub.textContent = err.message;
  }
}

// ─── PANEL ───
let currentPanel = null;

function openCommune(commune) {
  document.getElementById('commune-name').textContent = commune.nom;
  document.getElementById('commune-code').textContent = `Code INSEE : ${commune.code} · ${commune.conseillers_mun.length + 1} élus municipaux`;

  const tabs = [
    { id:'mun', label:'Conseil municipal', count: commune.conseillers_mun.length + 1, render: () => renderMun(commune) },
  ];
  if (commune.conseillers_epci.length > 0)
    tabs.push({ id:'epci', label:'EPCI', count: commune.conseillers_epci.length, render: () => renderEpci(commune) });

  buildTabs(tabs);
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-close').style.display = 'flex';
  currentPanel = 'commune';
}

function openDeptPanel() {
  document.getElementById('commune-name').textContent = 'Élus supra-communaux';
  document.getElementById('commune-code').textContent = 'Bas-Rhin · Grand Est · France · Europe';

  const tabs = [
    { id:'dep', label:'Cons. départ.', count: ELUS.conseillers_dep.length, render: renderDep },
    { id:'sen', label:'Sénateurs', count: ELUS.senateurs.length, render: renderSen },
    { id:'dep_nat', label:'Députés', count: ELUS.deputes.length, render: renderDepNat },
    { id:'reg', label:'Régionaux', count: ELUS.conseillers_reg.length, render: renderReg },
  ];

  buildTabs(tabs);
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-close').style.display = 'flex';
  currentPanel = 'dept';
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-close').style.display = 'none';
}

function buildTabs(tabs) {
  const tabsEl = document.getElementById('panel-tabs');
  tabsEl.innerHTML = '';
  tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0 ? ' active' : '');
    btn.innerHTML = `${t.label}<span class="tab-count">${t.count}</span>`;
    btn.onclick = () => {
      tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-body').innerHTML = t.render();
    };
    tabsEl.appendChild(btn);
  });
  document.getElementById('panel-body').innerHTML = tabs[0].render();
}

function renderMun(commune) {
  let html = '';
  html += `<div class="elu-card elu-mayor">
    <div class="elu-name">👑 ${commune.maire}</div>
    <div class="elu-fn">Maire</div>
  </div>`;
  
  const adjoints = commune.conseillers_mun.filter(e => e.fonction && e.fonction.includes('adjoint'));
  const autres = commune.conseillers_mun.filter(e => !e.fonction || !e.fonction.includes('adjoint'));
  
  if (adjoints.length) {
    html += `<div class="section-title">Adjoints (${adjoints.length})</div>`;
    adjoints.forEach(e => {
      html += `<div class="elu-card">
        <div class="elu-name">${e.nom}</div>
        ${e.fonction ? `<div class="elu-fn">${e.fonction}</div>` : ''}
      </div>`;
    });
  }
  if (autres.length) {
    html += `<div class="section-title">Conseillers municipaux (${autres.length})</div>`;
    autres.forEach(e => {
      html += `<div class="elu-card"><div class="elu-name">${e.nom}</div></div>`;
    });
  }
  return html;
}

function renderEpci(commune) {
  let html = '';
  const groups = {};
  commune.conseillers_epci.forEach(e => {
    const k = e.epci || 'EPCI';
    if (!groups[k]) groups[k] = [];
    groups[k].push(e);
  });
  for (const [epci, elus] of Object.entries(groups)) {
    html += `<div class="section-title" style="color:#f97316">${epci} (${elus.length})</div>`;
    elus.forEach(e => {
      html += `<div class="elu-card" style="border-color:rgba(249,115,22,0.2)">
        <div class="elu-name">${e.nom}</div>
        ${e.fonction ? `<div class="elu-fn">${e.fonction}</div>` : ''}
      </div>`;
    });
  }
  return html;
}

function renderDep() {
  let html = '';
  const byCanon = {};
  ELUS.conseillers_dep.forEach(e => {
    const k = e.canton || 'Sans canton';
    if (!byCanon[k]) byCanon[k] = [];
    byCanon[k].push(e);
  });
  const sorted = Object.keys(byCanon).sort();
  sorted.forEach(canton => {
    html += `<div class="section-title" style="color:#a0522d">Canton de ${canton}</div>`;
    byCanon[canton].forEach(e => {
      html += `<div class="elu-card" style="border-color:rgba(160,82,45,0.25)">
        <div class="elu-name">${e.nom}</div>
        ${e.fonction ? `<div class="elu-fn">${e.fonction}</div>` : ''}
      </div>`;
    });
  });
  return html;
}

function renderSen() {
  return ELUS.senateurs.map(e => `
    <div class="elu-card" style="border-color:rgba(34,197,94,0.25)">
      <div class="elu-name" style="color:#4ade80">🏛 ${e.nom}</div>
    </div>`).join('');
}

function renderDepNat() {
  return ELUS.deputes.map(e => `
    <div class="elu-card" style="border-color:rgba(168,85,247,0.25)">
      <div class="elu-name" style="color:#c084fc">${e.nom}</div>
      ${e.circo ? `<div class="elu-fn">${e.circo}</div>` : ''}
    </div>`).join('');
}

function renderReg() {
  const vps = ELUS.conseillers_reg.filter(e => e.fonction && e.fonction.includes('Vice'));
  const autres = ELUS.conseillers_reg.filter(e => !e.fonction || !e.fonction.includes('Vice'));
  let html = '';
  if (vps.length) {
    html += `<div class="section-title" style="color:#eab308">Vice-présidents (${vps.length})</div>`;
    vps.forEach(e => {
      html += `<div class="elu-card" style="border-color:rgba(234,179,8,0.25)">
        <div class="elu-name" style="color:#fde047">${e.nom}</div>
        <div class="elu-fn">${e.fonction}</div>
      </div>`;
    });
  }
  html += `<div class="section-title" style="color:#eab308">Conseillers régionaux (${autres.length})</div>`;
  autres.forEach(e => {
    html += `<div class="elu-card" style="border-color:rgba(234,179,8,0.15)">
      <div class="elu-name">${e.nom}</div>
    </div>`;
  });
  return html;
}



// ─── SEARCH ───
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (q.length < 2) { searchResults.style.display='none'; return; }

  const matches = ELUS.communes
    .filter(c => c.nom.toLowerCase().includes(q) || c.maire.toLowerCase().includes(q))
    .slice(0, 8);

  if (!matches.length) { searchResults.style.display='none'; return; }

  searchResults.innerHTML = matches.map(c => `
    <div class="search-item" onclick="jumpTo('${c.code}')">
      <strong>${c.nom}</strong>
      <small> — Maire : ${c.maire}</small>
    </div>`).join('');
  searchResults.style.display = 'block';
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchResults.style.display='none'; searchInput.blur(); }
});

document.addEventListener('click', e => {
  if (!document.getElementById('search-box').contains(e.target)) {
    searchResults.style.display = 'none';
  }
});

function jumpTo(code) {
  searchResults.style.display = 'none';
  searchInput.value = '';
  const entry = communeIndex[code];
  if (!entry) return;
  map.setView([entry.lat, entry.lng], 14, { animate: true });
  openCommune(entry);
}
